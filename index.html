<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打工人搞钱仪表盘</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px 0; background-color: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 320px; text-align: center; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; font-size: 20px;}
        .input-group { margin: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: #555;}
        input { width: 80px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        .info-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: left; font-size: 14px; color: #666; }
        .highlight { color: #d93025; font-weight: bold; font-size: 16px; }
        
        /* 进度条样式 */
        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 10px; margin-top: 20px; height: 24px; overflow: hidden; position: relative; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .progress-bar { height: 100%; background-color: #5aa469; width: 0%; transition: width 0.1s linear; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 12px; font-weight: bold; color: #333; top: 0; left: 0; }
        
        .countdown { margin-top: 15px; font-size: 16px; font-weight: bold; color: #1a73e8; }
        .money-display { font-size: 42px; font-weight: bold; color: #d93025; margin-top: 10px; font-family: monospace; }
        
        button { margin-top: 15px; width: 100%; padding: 12px; background-color: #5aa469; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #488a55; }

        /* 玻璃存钱罐样式 */
        .jar-container { display: flex; justify-content: center; margin-top: 20px; position: relative;}
        .glass-jar {
            width: 140px; height: 180px; 
            border: 4px solid rgba(200, 200, 200, 0.5); 
            border-bottom-width: 8px;
            border-radius: 20px 20px 30px 30px; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(5px);
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .jar-lid { width: 90px; height: 15px; background: #bbb; border-radius: 5px 5px 0 0; position: absolute; top: -15px; left: 25px; }
        .gold-fill {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(to top, #ffb703, #fb8500); 
            height: 0%; transition: height 0.5s linear;
            display: flex; align-items: flex-start; justify-content: center; overflow: hidden;
        }
        .coins { font-size: 24px; line-height: 1; margin-top: 5px; opacity: 0.8;}
    </style>
</head>
<body>
    <div class="card">
        <h2>⚙️ 参数设置</h2>
        <div class="input-group">
            <label>本月排班天数：</label>
            <input type="number" id="days" value="23" min="1" max="31">
        </div>
        <div class="input-group">
            <label>月薪 (元)：</label>
            <input type="number" id="salary" value="13500" min="0">
        </div>
        <div class="input-group">
            <label>每月发薪日：</label>
            <input type="number" id="paydayNum" value="15" min="1" max="31">
        </div>
        <button id="startBtn">开启搞钱模式</button>
    </div>

    <div id="dashboards" style="display: none; width: 100%; align-items: center; flex-direction: column;">
        
        <div class="card">
            <h2>⏱️ 今日搞钱进度</h2>
            <div class="info-panel">今日日薪估算：<span class="highlight" id="dailySalary">0.00</span> 元</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <div class="countdown" id="countdownDisplay">计算中...</div>
            
            <div style="margin-top: 20px; color: #555; font-size: 14px;">今日已变现：</div>
            <div class="money-display" id="moneyDisplay">0.0000</div>
        </div>

        <div class="card">
            <h2>🏺 月度财富积累</h2>
            <div class="countdown" id="paydayDisplay" style="color: #fb8500;">距离发薪日还有：计算中...</div>
            
            <div class="jar-container">
                <div class="jar-lid"></div>
                <div class="glass-jar">
                    <div class="gold-fill" id="jarFill">
                        <div class="coins">🪙🪙🪙</div>
                    </div>
                </div>
            </div>

            <div style="margin-top: 20px; color: #555; font-size: 14px;">本月已累积金额：</div>
            <div class="money-display" id="monthlyMoneyDisplay" style="color: #fb8500;">0.00</div>
        </div>

    </div>

    <script>
        let timer;
        
        document.getElementById('startBtn').addEventListener('click', function() {
            const days = parseFloat(document.getElementById('days').value);
            const salary = parseFloat(document.getElementById('salary').value);
            const paydayNum = parseInt(document.getElementById('paydayNum').value);
            
            if (isNaN(days) || isNaN(salary) || days <= 0 || isNaN(paydayNum)) {
                alert("请输入有效的数值");
                return;
            }

            const dailySalary = salary / days;
            document.getElementById('dailySalary').innerText = dailySalary.toFixed(2);
            
            // 隐藏设置卡片，显示仪表盘
            this.parentElement.style.display = 'none';
            document.getElementById('dashboards').style.display = 'flex';

            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                const now = new Date();
                
                // === 模块 1：今日进度计算 ===
                const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
                const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 30, 0);
                
                const totalWorkMs = endTime - startTime;
                let elapsedMs = now - startTime;

                if (elapsedMs < 0) elapsedMs = 0;
                if (elapsedMs > totalWorkMs) elapsedMs = totalWorkMs;

                const earnedToday = (elapsedMs / totalWorkMs) * dailySalary;
                document.getElementById('moneyDisplay').innerText = earnedToday.toFixed(4);

                const progressPercent = (elapsedMs / totalWorkMs) * 100;
                document.getElementById('progressBar').style.width = progressPercent + '%';
                document.getElementById('progressText').innerText = progressPercent.toFixed(1) + '%';

                let remainMs = endTime - now;
                if (remainMs <= 0) {
                    document.getElementById('countdownDisplay').innerText = "🎉 已经下班啦！";
                } else if (now < startTime) {
                    document.getElementById('countdownDisplay').innerText = "☕ 等待上班中...";
                } else {
                    let h = Math.floor(remainMs / (1000 * 60 * 60));
                    let m = Math.floor((remainMs % (1000 * 60 * 60)) / (1000 * 60));
                    let s = Math.floor((remainMs % (1000 * 60)) / 1000);
                    h = h < 10 ? '0' + h : h; m = m < 10 ? '0' + m : m; s = s < 10 ? '0' + s : s;
                    document.getElementById('countdownDisplay').innerText = `⏳ 距下班还有 ${h}:${m}:${s}`;
                }

                // === 模块 2：月度存钱罐与发薪日计算 ===
                // 计算距离发薪日的天数
                let paydayDate = new Date(now.getFullYear(), now.getMonth(), paydayNum);
                // 如果今天已经过了本月发薪日，就算到下个月的发薪日
                if (now.getDate() > paydayNum) {
                    paydayDate.setMonth(paydayDate.getMonth() + 1);
                }
                const daysToPayday = Math.ceil((paydayDate - now) / (1000 * 60 * 60 * 24));
                document.getElementById('paydayDisplay').innerText = `💰 距发薪日还有：${daysToPayday} 天`;

                // 计算本月自然时间流逝百分比（用来填充存钱罐）
                const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const nextMonthFirstDay = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                const monthTotalMs = nextMonthFirstDay - firstDayOfMonth;
                const monthPassedMs = now - firstDayOfMonth;
                
                let monthPercent = (monthPassedMs / monthTotalMs) * 100;
                if(monthPercent > 100) monthPercent = 100;

                // 更新存钱罐高度和月度累计金额
                document.getElementById('jarFill').style.height = monthPercent + '%';
                const monthlyEarned = (monthPercent / 100) * salary;
                document.getElementById('monthlyMoneyDisplay').innerText = monthlyEarned.toFixed(2);

            }, 50);
        });
    </script>
</body>
</html>
