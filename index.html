<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打工人搞钱双仪表盘</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 30px; background-color: #f4f4f9; margin: 0; }
        
        /* 设置卡片 */
        .card-setup { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 680px; text-align: center; margin-bottom: 30px; }
        .setup-header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px;}
        h2 { margin: 0; color: #333; font-size: 20px;}
        .inputs-container { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px;}
        .input-group { display: flex; align-items: center; font-size: 15px; color: #555; width: 45%; }
        .input-group label { width: 140px; text-align: right; margin-right: 10px; }
        input { width: 100px; padding: 6px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        button { margin-top: 25px; width: 100%; padding: 15px; background-color: #5aa469; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #488a55; }

        /* 仪表盘容器 */
        #dashboards { display: none; width: 100%; max-width: 900px; justify-content: space-between; gap: 20px; flex-direction: row;}
        .card-dash { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 48%; text-align: center;}
        
        /* 左侧：今日进度 */
        .highlight { color: #d93025; font-weight: bold; font-size: 16px; }
        .progress-container { width: 100%; background-color: #e9ecef; border-radius: 10px; margin-top: 20px; height: 24px; overflow: hidden; position: relative; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .progress-bar { height: 100%; background-color: #5aa469; width: 0%; transition: width 0.1s linear; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 24px; font-size: 12px; font-weight: bold; color: #333; top: 0; left: 0; }
        .countdown { margin-top: 15px; font-size: 16px; font-weight: bold; color: #1a73e8; }
        .money-display { font-size: 42px; font-weight: bold; color: #d93025; margin-top: 10px; font-family: monospace; }
        
        /* 右侧：小猪存钱罐 */
        #jarFillSVG { width: 100%; height: 100%; position: absolute; bottom: 0; left: 0; transform: translateY(100%); transition: transform 0.5s linear;}
        .jar-outer { position: relative; width: 180px; height: 180px; margin: 20px auto 0; overflow: hidden; border-radius: 50%;}
        .jar-piggy-mask { position: relative; width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); overflow: hidden;}
        /* SVG 遮罩层 */
        .jar-overlay-mask { width: 100%; height: 100%; position: absolute; top: 0; left: 0; mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 0 C22.38 0 0 22.38 0 50 C0 77.62 22.38 100 50 100 L 50 100 C 77.62 100 100 77.62 100 50 C 100 22.38 77.62 0 50 0 M50 15 A 35 35 0 1 0 50 85 A 35 35 0 1 0 50 15"/></svg>'); mask-size: 100%; -webkit-mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 0 C22.38 0 0 22.38 0 50 C0 77.62 22.38 100 50 100 L 50 100 C 77.62 100 100 77.62 100 50 C 100 22.38 77.62 0 50 0 M50 15 A 35 35 0 1 0 50 85 A 35 35 0 1 0 50 15"/></svg>'); -webkit-mask-size: 100%; overflow: hidden;}
        
        /* 半透明背景（未达到） */
        .piggy-empty { width: 100%; height: 100%; position: absolute; background-color: rgba(255, 182, 193, 0.4); mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 15 A 35 35 0 1 1 50 85 A 35 35 0 1 1 50 15 M 50 15"/></svg>'); mask-size: 100%; -webkit-mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 15 A 35 35 0 1 1 50 85 A 35 35 0 1 1 50 15 M 50 15"/></svg>'); -webkit-mask-size: 100%; }
        /* 填充层和波浪 */
        .piggy-filled { width: 100%; height: 100%; position: absolute; background-color: #FFB6C1; mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 15 A 35 35 0 1 1 50 85 A 35 35 0 1 1 50 15 M 50 15"/></svg>'); mask-size: 100%; -webkit-mask-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M50 15 A 35 35 0 1 1 50 85 A 35 35 0 1 1 50 15 M 50 15"/></svg>'); -webkit-mask-size: 100%; overflow: hidden;}
        
        /* 水波动动画路径 */
        .wave-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; transform: translateY(100%); transition: transform 0.5s linear; }
        .wave { fill: #FFB6C1; animation: waveMovement 2s linear infinite; }
        @keyframes waveMovement {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .gold-display { font-size: 32px; font-weight: bold; color: #fb8500; margin-top: 10px; font-family: monospace; }
        @media (max-width: 700px) {
            .card-setup { width: 90%; }
            .input-group { width: 100%; }
            #dashboards { flex-direction: column; width: 100%; align-items: center;}
            .card-dash { width: 90%; margin-bottom: 20px;}
        }
    </style>
</head>
<body>
    <div class="card-setup">
        <div class="setup-header"><h2>⚙️ 参数设置</h2></div>
        <div class="inputs-container">
            <div class="input-group"><label>本月月份：</label><input type="number" id="monthInput" min="1" max="12"></div>
            <div class="input-group"><label>本月排班天数：</label><input type="number" id="days" min="1" max="31"></div>
            <div class="input-group"><label>月薪 (元)：</label><input type="number" id="salary" min="0"></div>
            <div class="input-group"><label>每月发薪日：</label><input type="number" id="paydayNum" min="1" max="31"></div>
        </div>
        <button id="startBtn">开启搞钱模式</button>
    </div>

    <div id="dashboards">
        
        <div class="card-dash">
            <h2>⏱️ 今日搞钱进度</h2>
            <div style="font-size:14px; color:#666;">今日日薪估算：<span class="highlight" id="dailySalary">0.00</span> 元</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            
            <div class="countdown" id="countdownDisplay">⏳ 距下班还有: --:--:--</div>
            
            <div style="margin-top: 20px; color: #555; font-size: 14px;">今日已变现：</div>
            <div class="money-display" id="moneyDisplay">0.0000</div>
        </div>

        <div class="card-dash">
            <h2>🏺 月度财富积累</h2>
            <div class="countdown" id="paydayDisplay" style="color: #fb8500;">💰 距发薪日还有：-- 天</div>
            
            <div class="jar-outer">
                <div class="jar-piggy-mask">
                    <div class="jar-overlay-mask">
                        <div class="piggy-empty"></div>
                        <div class="wave-container" id="waveFill">
                            <svg class="wave" viewBox="0 0 200 100" preserveAspectRatio="none">
                                <path d="M0,50 C50,0 150,100 200,50 L200,100 L0,100 Z" />
                                <path d="M0,50 C50,100 150,0 200,50 L200,100 L0,100 Z" transform="translateX(100)"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div style="font-size:32px; position:absolute; top:-15px; left: calc(50% - 16px);">🪙</div>
            </div>

            <div style="margin-top: 20px; color: #555; font-size: 14px;">本月已累积金额：</div>
            <div class="gold-display" id="monthlyMoneyDisplay">0.00</div>
        </div>

    </div>

    <script>
        let timer;
        
        document.getElementById('startBtn').addEventListener('click', function() {
            const days = parseFloat(document.getElementById('days').value);
            const salary = parseFloat(document.getElementById('salary').value);
            const paydayNum = parseInt(document.getElementById('paydayNum').value);
            
            if (isNaN(days) || isNaN(salary) || days <= 0 || isNaN(paydayNum)) {
                alert("请输入有效的数值");
                return;
            }

            const dailySalary = salary / days;
            document.getElementById('dailySalary').innerText = dailySalary.toFixed(2);
            
            // 隐藏设置卡片，显示仪表盘
            this.parentElement.style.display = 'none';
            document.getElementById('dashboards').style.display = 'flex';

            if (timer) clearInterval(timer);

            timer = setInterval(() => {
                const now = new Date();
                
                // === 模块 1：今日进度计算 ===
                const startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 9, 0, 0);
                const endTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 17, 30, 0);
                
                const totalWorkMs = endTime - startTime;
                let elapsedMs = now - startTime;

                if (elapsedMs < 0) elapsedMs = 0;
                if (elapsedMs > totalWorkMs) elapsedMs = totalWorkMs;

                const earnedToday = (elapsedMs / totalWorkMs) * dailySalary;
                document.getElementById('moneyDisplay').innerText = earnedToday.toFixed(4);

                const progressPercent = (elapsedMs / totalWorkMs) * 100;
                document.getElementById('progressBar').style.width = progressPercent + '%';
                document.getElementById('progressText').innerText = progressPercent.toFixed(1) + '%';

                let remainMs = endTime - now;
                if (remainMs <= 0) {
                    document.getElementById('countdownDisplay').innerText = "🎉 已经下班啦！";
                } else if (now < startTime) {
                    document.getElementById('countdownDisplay').innerText = "☕ 等待上班中...";
                } else {
                    let h = Math.floor(remainMs / (1000 * 60 * 60));
                    let m = Math.floor((remainMs % (1000 * 60 * 60)) / (1000 * 60));
                    let s = Math.floor((remainMs % (1000 * 60)) / 1000);
                    h = h < 10 ? '0' + h : h; m = m < 10 ? '0' + m : m; s = s < 10 ? '0' + s : s;
                    document.getElementById('countdownDisplay').innerText = `⏳ 距下班还有 ${h}:${m}:${s}`;
                }

                // === 模块 2：月度存钱罐与发薪日计算 ===
                // 计算距离发薪日的天数
                let paydayDate = new Date(now.getFullYear(), now.getMonth(), paydayNum);
                // 如果今天已经过了本月发薪日，就算到下个月的发薪日
                if (now.getDate() > paydayNum) {
                    paydayDate.setMonth(paydayDate.getMonth() + 1);
                }
                const daysToPayday = Math.ceil((paydayDate - now) / (1000 * 60 * 60 * 24));
                document.getElementById('paydayDisplay').innerText = `💰 距发薪日还有：${daysToPayday} 天`;

                // 计算本月自然时间流逝百分比（用来填充存钱罐）
                const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                const nextMonthFirstDay = new Date(now.getFullYear(), now.getMonth() + 1, 1);
                const monthTotalMs = nextMonthFirstDay - firstDayOfMonth;
                const monthPassedMs = now - firstDayOfMonth;
                
                let monthPercent = (monthPassedMs / monthTotalMs) * 100;
                if(monthPercent > 100) monthPercent = 100;

                // 更新存钱罐填充高度和月度累计金额
                // 使用 translateY(0%) 到 translateY(100%) 控制高度，0% 是满，100% 是空
                document.getElementById('waveFill').style.transform = `translateY(${100 - monthPercent}%)`;
                const monthlyEarned = (monthPercent / 100) * salary;
                document.getElementById('monthlyMoneyDisplay').innerText = monthlyEarned.toFixed(2);

            }, 50);
        });
    </script>
</body>
</html>
